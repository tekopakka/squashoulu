name: Site uptime monitor

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run site uptime monitor
        env:
          BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: |
          python .github/scripts/check_site.py
