<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Squash Oulu | Galleria</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body data-page="gallery">
  <div class="page-shell">
    <div id="siteHeader"></div>
    <main class="content-grid">
      <section class="main-column">
        <section class="content-block gallery-block">
          <h1 data-i18n="galleryTitle">Galleria</h1>
          <table class="gallery-table">
            <tbody>
              <tr>
                <td>
                  <figure>
                    <img src="" alt="Squash kenttä" />
                    <figcaption data-i18n="galleryCaption1">Kenttävaloja</figcaption>
                  </figure>
                </td>
                <td>
                  <figure>
                    <img src="" alt="Squash pelaajat" />
                    <figcaption data-i18n="galleryCaption2">Pelikaverit</figcaption>
                  </figure>
                </td>
              </tr>
              <tr>
                <td>
                  <figure>
                    <img src="" alt="Juniorit squashissa" />
                    <figcaption data-i18n="galleryCaption3">Junioriharjoitus</figcaption>
                  </figure>
                </td>
                <td></td>
              </tr>
            </tbody>
          </table>
        </section>
      </section>

      <aside class="sidebar" id="siteEvents"></aside>
</main>
    <div id="siteFooter"></div>
</div>
  <script src="js/app.js"></script>
</body>
</html>
